# Memberi nama workflow di GitHub.
name: CI/CD ML Pipeline

# Workflow akan berjalan ketika ada push ke branch main.
on:
  push:
    branches: [main]
    paths: # Workflow akan berjalan ketika ada push ke branch main.
      - 'preprocessing/**'
      - 'dataset_raw/**'
      - 'MLProject/**'
      - '.github/workflows/ci.yml'

jobs:
  # JOB 1: Pipeline Preprocessing Datastet
  preprocess-data: # Membatasi folder yang memicu workflow
    runs-on: ubuntu-latest

    # Mengambil kode dari repository GitHub ke server CI.
    steps: 
      - name: Checkout repository
        uses: actions/checkout@v3

      # Install Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependency python
      - name: Install Dependency
        run: |
          pip install -r requirements.txt
          

      # Running preprocessing script
      - name: Run preprocessing script
        run: |
          python preprocessing/automate_preprocessing.py
          

      # Mengambil kode dari repository GitHub ke server CI.
      # Menyimpan file antar job
      - name: Upload processed dataset as artifact
        uses: actions/upload-artifact@v4
        with:
          name: processed-datasets
          path: preprocessing/diamond_preprocessing

  # JOB 2: Pipeline Training and Delivering Model
  train-and-deliver-model:
    # Job ini hanya berjalan setelah preprocessing selesai.
    needs: preprocess-data
    runs-on: ubuntu-latest

    steps:
        # Mengambil kode dari repository GitHub ke server CI.
      - name: Checkout repository
        uses: actions/checkout@v3

        # Install Python
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # Install dependency python
      - name: Install ML Dependency
        run: |
          pip install -r requirements.txt
          

      # Download kode dari repository GitHub ke server CI.
      # Download file antar job
      - name: Download processed dataset as artifact
        uses: actions/download-artifact@v4
        with:
          name: processed-datasets
          path: preprocessing/diamond_preprocessing

      # Running MLFlow
      - name: Run MLFlow project
        run: |
          mlflow run MLProject --env-manager=local

      # Script ini mencari run terakhir dari MLflow
      - name: Get latest MLflow run_id
        run: |
          RUN_ID=$(ls -td mlruns/0/*/ | head -n 1 | cut -d'/' -f3)
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest run_id: $RUN_ID"

      # Upload folder model hasil training ke artifact GitHub Actions.
      # Jadi kalau mau diunduh nanti, bisa pakai artifact ini.
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: mlruns/0/${{ env.RUN_ID }}/artifacts/model

      # Docker image = “template” atau blueprint untuk sebuah aplikasi atau program.
      - name: Build Docker Image from trained model
        run: |
          mlflow models build-docker \
          --model-uri "runs:/${{ env.RUN_ID }}/model" \
          --name diamond-model \
          --env-manager=virtualenv


      # Login ke Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Docker image yang tadi dibuat diberi tag supaya bisa dipush ke akun Docker Hub kamu.
      - name: Tag Docker Image
        run: |
          docker tag diamond-model \
            ${{ secrets.DOCKER_HUB_USERNAME }}/diamond-model:latest
          

      # Push docker
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/diamond-model:latest
